# ============================================================
# Augmented LLM 配置文件 (Chat + MCP + RAG)
# ============================================================
# 使用方法: 复制为 config.yaml 并填入你的 API Key

# --- DeepSeek LLM 配置 ---
llm:
  api_key: "YOUR_DEEPSEEK_API_KEY"   # 替换为你的 API Key
  base_url: "https://api.deepseek.com"
  model: "deepseek-chat"
  max_tokens: 4096
  temperature: 0.7

# --- MCP Servers 配置 ---
mcp_servers:
  - name: "builtin"
    command: ".venv/Scripts/python.exe"
    args: ["mcp_servers/builtin_tools.py"]
    env: {}

  # 示例: 文件系统 MCP Server (使用 npx, 需安装 Node.js)
  # - name: "filesystem"
  #   command: "npx"
  #   args: ["-y", "@modelcontextprotocol/server-filesystem", "E:/Agent_rec/Agent_LLM_MCP_RAG/data"]
  #   env: {}

  # 示例: 网页抓取 MCP Server (使用 uvx, 需安装 uv)
  # - name: "fetch"
  #   command: "uvx"
  #   args: ["mcp-server-fetch"]
  #   env: {}

# --- Embedding / RAG 配置 ---
# 留空 api_key 即禁用 RAG；填入 SiliconFlow Key 即可启用
embedding:
  api_key: "YOUR_SILICONFLOW_API_KEY"   # 替换为你的 SiliconFlow API Key
  base_url: "https://api.siliconflow.cn/v1"
  model: "BAAI/bge-m3"
  data_url: ""                          # 数据源 URL（JSON 数组），用 /RAG <url> 动态加载
  top_k: 3            # RAG 检索返回的最大条数

# --- 系统参数 ---
system:
  max_tool_rounds: 10     # 最大工具调用轮数（防止死循环）
  log_level: "INFO"       # DEBUG | INFO | WARNING
  memory_file: "chat_memory.json"  # 长期记忆文件（关闭终端后保留）